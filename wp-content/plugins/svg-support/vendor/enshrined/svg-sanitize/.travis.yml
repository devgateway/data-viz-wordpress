language: php
php:
  - 7.0
  - 7.1
  - 7.2

before_script:
  - composer install --dev

addons:
  code_climate:
    repo_token: ***REMOVED***

after_script:
  - CODECLIMATE_REPO_TOKEN="***REMOVED***" vendor/bin/test-reporter --stdout > build/logs/codeclimate.json
  - "curl --verbose -X POST -d @build/logs/codeclimate.json -H 'Content-Type: application/json' -H 'User-Agent: Code Climate (PHP Test Reporter v0.1.1)' https://codeclimate.com/test_reports"