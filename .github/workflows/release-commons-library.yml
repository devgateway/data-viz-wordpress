name: Release Commons Library

on:
  workflow_dispatch:
  push:
    paths:
      - "packages/commons/**"
    branches:
      - main

jobs:
  release-commons-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"
      
      - name: Install PNPM
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      
      - name: Cache PNPM
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.arch }}-pnpm-

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        working-directory: packages/commons
        run: pnpm build


      - name: Create Release
        uses: changesets/action@v1
        id: release
        with:
          commit: "chore(release): update version"
          title: "chore(release): update version"
          publish: pnpm run ci:publish

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          