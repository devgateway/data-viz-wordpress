fastcgi_cache_path /var/cache/nginx/wp levels=1 keys_zone=wp:128k inactive=1h;
fastcgi_cache_methods GET HEAD;

upstream php_fcgi {
  server wordpress:9000;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  client_header_buffer_size 5120k;
  large_client_header_buffers 16 5120k;
  client_max_body_size 30M;
  gzip on;
  gzip_vary on;

  location /wp {

    if ($uri ~* "\.(css|jpe?g|js(on)?|png|xml|gif|pdf|(doc|xls|ppt)x?)$") {
      add_header Access-Control-Allow-Origin *;
      expires max;
    }
    alias /var/www/html;
    index index.php;
    # https://trac.nginx.org/nginx/ticket/97
    # bug in Nginx worked around by doubling location prefix:
    try_files $uri $uri/ /wp/wp/index.php$is_args$args;
    client_max_body_size 30M;
    gzip on;
    fastcgi_cache wp;
    gzip_types *;

    # Optimize WordPress load-styles.php (large critical CSS)
    location ~ /wp-admin/load-styles\.php$ {
      include fastcgi.conf;
      fastcgi_split_path_info ^/wp(.+\.php)(.*)$;
      fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
      fastcgi_pass php_fcgi;
      fastcgi_hide_header X-Powered-By;

      # Aggressive compression for large CSS file (200-400KB -> 40-80KB)
      gzip on;
      gzip_comp_level 9;
      gzip_types text/css;
      gzip_vary on;

      # Long cache since WordPress styles rarely change
      add_header Cache-Control "public, max-age=604800, immutable";
      add_header Access-Control-Allow-Origin *;
      expires 7d;

      # Enable FastCGI cache for this endpoint
      fastcgi_cache wp;
      fastcgi_cache_key $request_uri;
      fastcgi_cache_valid 200 7d;
      fastcgi_cache_use_stale error timeout invalid_header updating;
      add_header X-Cache-Status $upstream_cache_status;
    }

    location ~ \.php$ {
      include fastcgi.conf;
      fastcgi_split_path_info ^/wp(.+\.php)(.*)$;
      fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
      fastcgi_pass php_fcgi;
      fastcgi_hide_header X-Powered-By;
      fastcgi_cache_key $request_uri;
      #fastcgi_cache_valid 15m;
    }
  }

  location ^~ /wp-media/ {
    alias /var/www/html/wp-content/uploads/;
    add_header Access-Control-Allow-Origin *;
    expires max;
  }

}